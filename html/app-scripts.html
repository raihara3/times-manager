<script>
  /**
   * .Times - Single Page Application
   */

  class TimesApp {
    constructor() {
      this.currentUser = null;
      this.currentView = "login";
      this.init();
    }

    /**
     * アプリケーションの初期化
     */
    init() {
      this.checkUserSession();
      this.setupEventListeners();
    }

    /**
     * ユーザーセッションの確認
     */
    checkUserSession() {
      const userData = localStorage.getItem("times_user_data");
      if (userData) {
        this.currentUser = JSON.parse(userData);
        this.showHomeView();
      } else {
        this.showLoginView();
      }
    }

    /**
     * イベントリスナーのセットアップ
     */
    setupEventListeners() {
      // ログイン関連
      this.setupLoginForm();
      this.setupRegisterForm();
      this.setupFormSwitching();

      // ナビゲーション
      this.setupNavigation();

      // アクション
      this.setupActions();

      // 保存された社員番号の読み込み
      this.loadSavedEmployeeNumber();
    }

    /**
     * ログインビューを表示
     */
    showLoginView() {
      const loginView = document.getElementById("loginView");
      const homeView = document.getElementById("homeView");

      if (loginView && homeView) {
        loginView.style.display = "block";
        loginView.classList.add("active");
        homeView.style.display = "none";
        homeView.classList.remove("active");
      }

      this.currentView = "login";
    }

    /**
     * ホームビューを表示
     */
    showHomeView() {
      const loginView = document.getElementById("loginView");
      const homeView = document.getElementById("homeView");

      if (loginView && homeView) {
        loginView.style.display = "none";
        loginView.classList.remove("active");
        homeView.style.display = "block";
        homeView.classList.add("active");
      }

      this.currentView = "home";
      this.updateUserDisplay();
    }

    /**
     * ログインフォームのセットアップ
     */
    setupLoginForm() {
      const loginForm = document.getElementById("loginForm");

      if (loginForm) {
        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          await this.handleLogin();
        });
      }
    }

    /**
     * 登録フォームのセットアップ
     */
    setupRegisterForm() {
      const registerForm = document.getElementById("registerForm");

      if (registerForm) {
        registerForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          await this.handleRegister();
        });
      }
    }

    /**
     * フォーム切り替えのセットアップ
     */
    setupFormSwitching() {
      const showRegisterBtn = document.getElementById("showRegisterBtn");
      const showLoginBtn = document.getElementById("showLoginBtn");

      if (showRegisterBtn) {
        showRegisterBtn.addEventListener("click", () => {
          this.showRegisterForm();
        });
      }

      if (showLoginBtn) {
        showLoginBtn.addEventListener("click", () => {
          this.showLoginForm();
        });
      }
    }

    /**
     * ナビゲーションのセットアップ
     */
    setupNavigation() {
      const navBtns = document.querySelectorAll(".nav-btn");

      navBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const section = btn.dataset.section;
          if (section) {
            this.switchSection(section);
            this.updateNavActive(btn);
          }
        });
      });
    }

    /**
     * アクションボタンのセットアップ
     */
    setupActions() {
      const viewSpreadsheetBtn = document.getElementById("viewSpreadsheetBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const messageCloseBtn = document.getElementById("messageCloseBtn");

      if (viewSpreadsheetBtn) {
        viewSpreadsheetBtn.addEventListener("click", () => {
          this.openSpreadsheet();
        });
      }

      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          this.logout();
        });
      }

      if (messageCloseBtn) {
        messageCloseBtn.addEventListener("click", () => {
          this.hideMessage();
        });
      }
    }

    /**
     * 保存された社員番号の読み込み
     */
    loadSavedEmployeeNumber() {
      const saved = localStorage.getItem("times_employee_number");
      if (saved) {
        const employeeNumberInput = document.getElementById("employeeNumber");
        if (employeeNumberInput) {
          employeeNumberInput.value = saved;
        }
      }
    }

    /**
     * ログイン処理
     */
    async handleLogin() {
      const employeeNumber = document
        .getElementById("employeeNumber")
        .value.trim();

      if (!employeeNumber) {
        this.showMessage("社員番号を入力してください。", "error");
        return;
      }

      this.showLoading();
      this.disableButton("loginBtn");

      try {
        const result = await this.callGASFunction("loginUser", employeeNumber);

        console.log("ログイン結果:", result);

        if (!result) {
          this.showMessage("サーバーからの応答がありません。", "error");
          return;
        }

        if (result.success) {
          // 社員番号を保存
          localStorage.setItem("times_employee_number", employeeNumber);

          // ユーザー情報を保存
          localStorage.setItem("times_user_data", JSON.stringify(result.user));
          this.currentUser = result.user;

          // ホームビューに切り替え
          this.showHomeView();
          this.showMessage("ログインしました！", "success");
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("ログインエラー:", error);
        this.showMessage(
          "ログインに失敗しました。しばらく後に再試行してください。",
          "error"
        );
      } finally {
        this.hideLoading();
        this.enableButton("loginBtn");
      }
    }

    /**
     * ユーザー登録処理
     */
    async handleRegister() {
      const employeeNumber = document
        .getElementById("regEmployeeNumber")
        .value.trim();
      const name = document.getElementById("regName").value.trim();

      if (!employeeNumber || !name) {
        this.showMessage("社員番号と名前を入力してください。", "error");
        return;
      }

      this.showLoading();
      this.disableButton("registerBtn");

      try {
        const result = await this.callGASFunction(
          "registerUser",
          employeeNumber,
          name
        );

        if (result.success) {
          this.showMessage(result.message, "success");

          // フォームをクリア
          document.getElementById("regEmployeeNumber").value = "";
          document.getElementById("regName").value = "";

          // ログインフォームに切り替え
          setTimeout(() => {
            this.showLoginForm();

            // 社員番号を自動入力
            const loginEmployeeInput =
              document.getElementById("employeeNumber");
            if (loginEmployeeInput) {
              loginEmployeeInput.value = employeeNumber;
            }
          }, 2000);
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("登録エラー:", error);
        this.showMessage(
          "登録に失敗しました。しばらく後に再試行してください。",
          "error"
        );
      } finally {
        this.hideLoading();
        this.enableButton("registerBtn");
      }
    }

    /**
     * ログアウト処理
     */
    logout() {
      if (confirm("ログアウトしますか？")) {
        // ローカルストレージをクリア
        localStorage.removeItem("times_user_data");
        this.currentUser = null;

        // ログインビューに切り替え
        this.showLoginView();
        this.showMessage("ログアウトしました。", "success");
      }
    }

    /**
     * スプレッドシートを開く
     */
    async openSpreadsheet() {
      this.showLoading();

      try {
        const result = await this.callGASFunction("getSpreadsheetInfo");

        if (result.url) {
          window.open(result.url, "_blank");
        } else {
          this.showMessage(
            "スプレッドシートの情報を取得できませんでした。",
            "error"
          );
        }
      } catch (error) {
        console.error("スプレッドシート取得エラー:", error);
        this.showMessage("スプレッドシートを開けませんでした。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 登録フォームを表示
     */
    showRegisterForm() {
      const loginSection = document.getElementById("loginSection");
      const registerSection = document.getElementById("registerSection");

      if (loginSection && registerSection) {
        loginSection.style.display = "none";
        registerSection.style.display = "block";
      }

      this.hideMessage();
    }

    /**
     * ログインフォームを表示
     */
    showLoginForm() {
      const loginSection = document.getElementById("loginSection");
      const registerSection = document.getElementById("registerSection");

      if (loginSection && registerSection) {
        loginSection.style.display = "block";
        registerSection.style.display = "none";
      }

      this.hideMessage();
    }

    /**
     * セクションの切り替え
     */
    switchSection(sectionName) {
      // 全セクションを非表示
      const sections = document.querySelectorAll(".content-section");
      sections.forEach((section) => {
        section.style.display = "none";
        section.classList.remove("active");
      });

      // 指定セクションを表示
      let targetSection;
      switch (sectionName) {
        case "dashboard":
          targetSection = document.getElementById("dashboardSection");
          break;
        case "attendance":
          targetSection = document.getElementById("attendanceSection");
          // 出退勤セクションに移動時は勤怠データを初期化
          this.initializeAttendanceSection();
          break;
        case "workload":
          targetSection = document.getElementById("workloadSection");
          // 工数管理セクションに移動時は工数データを初期化
          this.initializeWorkloadSection();
          break;
        case "coming-soon":
          targetSection = document.getElementById("comingSoonSection");
          break;
        default:
          targetSection = document.getElementById("dashboardSection");
      }

      if (targetSection) {
        targetSection.style.display = "block";
        targetSection.classList.add("active");
      }
    }

    /**
     * 工数管理セクションの初期化
     */
    initializeWorkloadSection() {
      if (!this.workloadInitialized) {
        this.setupWorkloadManagement();
        this.workloadInitialized = true;
      }
      this.loadWorkloadData();
    }

    /**
     * 出退勤セクションの初期化
     */
    initializeAttendanceSection() {
      if (!this.currentUser) return;

      // 勤怠関連のボタンイベント設定
      this.setupAttendanceButtons();

      // カレンダーと詳細のセットアップ
      this.setupCalendarAndDetails();

      // 勤怠データの読み込み
      this.loadAttendanceData();
    }

    /**
     * 勤怠ボタンのセットアップ
     */
    setupAttendanceButtons() {
      const buttons = {
        clockIn: document.getElementById("btnClockIn"),
        clockOut: document.getElementById("btnClockOut"),
        breakStart: document.getElementById("btnBreakStart"),
        breakEnd: document.getElementById("btnBreakEnd"),
      };

      // 各ボタンのイベントリスナーを設定
      Object.entries(buttons).forEach(([action, button]) => {
        if (button) {
          // 既存のイベントリスナーを削除
          button.replaceWith(button.cloneNode(true));
          const newButton = document.getElementById(
            `btn${action.charAt(0).toUpperCase() + action.slice(1)}`
          );

          newButton.addEventListener("click", async () => {
            await this.performAttendanceAction(action);
          });
        }
      });
    }

    /**
     * 勤怠アクションの実行
     */
    async performAttendanceAction(action) {
      if (!this.currentUser) return;

      this.showLoading();

      try {
        const result = await this.callGASFunction(
          "stampAction",
          this.currentUser.employeeNumber,
          action
        );

        if (result.success) {
          // データを再読み込み
          await this.loadAttendanceData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("勤怠アクションエラー:", error);
        this.showMessage("勤怠記録に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 勤怠データの読み込み
     */
    async loadAttendanceData() {
      if (!this.currentUser) return;

      try {
        // 打刻ボタンを一時的に無効化
        this.disableAllPunchButtons();

        // 現在の状態を取得
        const statusResult = await this.callGASFunction(
          "getCurrentStatus",
          this.currentUser.employeeNumber
        );
        this.updateStatusDisplay(statusResult.status);
        this.updateAttendanceButtons(statusResult.status);

        // 月次データを読み込み
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;

        // 月次メトリクスを取得
        const metrics = await this.callGASFunction(
          "getMonthlyMetrics",
          this.currentUser.employeeNumber,
          year,
          month
        );
        this.updateMetricsDisplay(metrics);

        // カレンダーデータも読み込み（現在表示月と同じ場合のみ）
        if (
          this.currentCalendarYear === year &&
          this.currentCalendarMonth === month
        ) {
          // カレンダーデータのみ読み込み（メトリクスは既に読み込み済み）
          try {
            const summary = await this.callGASFunction(
              "getDailySummary",
              this.currentUser.employeeNumber,
              this.currentCalendarYear,
              this.currentCalendarMonth
            );
            this.renderCalendar(summary);

            const records = await this.callGASFunction(
              "getAttendanceRecords",
              this.currentUser.employeeNumber,
              this.currentCalendarYear,
              this.currentCalendarMonth
            );
            this.renderDetails(records);
          } catch (error) {
            console.error("初回カレンダーデータ読み込みエラー:", error);
          }
        }
      } catch (error) {
        console.error("勤怠データ読み込みエラー:", error);
        this.showMessage("勤怠データの読み込みに失敗しました。", "error");
        // エラー時もボタンを復元（未出勤状態として扱う）
        this.updateAttendanceButtons("未出勤");
      }
    }

    /**
     * 状態表示の更新
     */
    updateStatusDisplay(status) {
      const statusDisplay = document.getElementById("statusDisplay");
      const statusText = document.getElementById("statusText");

      if (!statusDisplay || !statusText) return;

      const statusConfig = {
        未出勤: { icon: "⚪", color: "#6b7280" },
        出勤中: { icon: "🟢", color: "#10b981" },
        中抜け中: { icon: "⏸️", color: "#f59e0b" },
        退勤済み: { icon: "🔴", color: "#ef4444" },
      };

      const config = statusConfig[status] || statusConfig["未出勤"];

      statusDisplay.style.background = `linear-gradient(135deg, ${config.color}, ${config.color}dd)`;
      statusText.textContent = `現在の状況: ${status}`;

      const statusIcon = statusDisplay.querySelector(".status-icon");
      if (statusIcon) {
        statusIcon.textContent = config.icon;
      }
    }

    /**
     * 全打刻ボタンを無効化
     */
    disableAllPunchButtons() {
      const buttons = {
        clockIn: document.getElementById("btnClockIn"),
        clockOut: document.getElementById("btnClockOut"),
        breakStart: document.getElementById("btnBreakStart"),
        breakEnd: document.getElementById("btnBreakEnd"),
      };

      Object.values(buttons).forEach((btn) => {
        if (btn) {
          btn.disabled = true;
          btn.style.opacity = "0.5";
        }
      });
    }

    /**
     * 勤怠ボタンの状態更新
     */
    updateAttendanceButtons(status) {
      const buttons = {
        clockIn: document.getElementById("btnClockIn"),
        clockOut: document.getElementById("btnClockOut"),
        breakStart: document.getElementById("btnBreakStart"),
        breakEnd: document.getElementById("btnBreakEnd"),
      };

      // 全ボタンを一旦無効化
      Object.values(buttons).forEach((btn) => {
        if (btn) {
          btn.disabled = true;
          btn.style.opacity = "0.5";
        }
      });

      // 状態に応じて有効なボタンを設定
      switch (status) {
        case "未出勤":
        case "退勤済み":
          if (buttons.clockIn) {
            buttons.clockIn.disabled = false;
            buttons.clockIn.style.opacity = "1";
          }
          break;
        case "出勤中":
          if (buttons.clockOut) {
            buttons.clockOut.disabled = false;
            buttons.clockOut.style.opacity = "1";
          }
          if (buttons.breakStart) {
            buttons.breakStart.disabled = false;
            buttons.breakStart.style.opacity = "1";
          }
          break;
        case "中抜け中":
          if (buttons.breakEnd) {
            buttons.breakEnd.disabled = false;
            buttons.breakEnd.style.opacity = "1";
          }
          break;
      }
    }

    /**
     * カレンダーと詳細のセットアップ
     */
    setupCalendarAndDetails() {
      this.currentCalendarYear = new Date().getFullYear();
      this.currentCalendarMonth = new Date().getMonth() + 1;

      // 月切り替えボタンのイベント設定
      const prevMonthBtn = document.getElementById("prevMonthBtn");
      const nextMonthBtn = document.getElementById("nextMonthBtn");

      if (prevMonthBtn) {
        prevMonthBtn.addEventListener("click", () => {
          this.navigateMonth(-1);
        });
      }

      if (nextMonthBtn) {
        nextMonthBtn.addEventListener("click", () => {
          this.navigateMonth(1);
        });
      }

      this.updateCurrentMonthDisplay();
      this.updateMetricsTitle();
    }

    /**
     * 月移動
     */
    navigateMonth(direction) {
      this.currentCalendarMonth += direction;

      if (this.currentCalendarMonth < 1) {
        this.currentCalendarMonth = 12;
        this.currentCalendarYear--;
      } else if (this.currentCalendarMonth > 12) {
        this.currentCalendarMonth = 1;
        this.currentCalendarYear++;
      }

      this.updateCurrentMonthDisplay();
      this.loadCalendarData();
    }

    /**
     * 現在月表示の更新
     */
    updateCurrentMonthDisplay() {
      const currentMonthElement = document.getElementById("currentMonth");
      if (currentMonthElement) {
        currentMonthElement.textContent = `${this.currentCalendarYear}年${this.currentCalendarMonth}月`;
      }
    }

    /**
     * カレンダーデータの読み込み
     */
    async loadCalendarData() {
      if (!this.currentUser) return;

      try {
        // 日次サマリーを取得
        const summary = await this.callGASFunction(
          "getDailySummary",
          this.currentUser.employeeNumber,
          this.currentCalendarYear,
          this.currentCalendarMonth
        );
        this.renderCalendar(summary);

        // 打刻詳細を取得
        const records = await this.callGASFunction(
          "getAttendanceRecords",
          this.currentUser.employeeNumber,
          this.currentCalendarYear,
          this.currentCalendarMonth
        );
        this.renderDetails(records);

        // 月次メトリクスを取得・更新
        const metrics = await this.callGASFunction(
          "getMonthlyMetrics",
          this.currentUser.employeeNumber,
          this.currentCalendarYear,
          this.currentCalendarMonth
        );
        this.updateMetricsDisplay(metrics);

        // タイトルを更新
        this.updateMetricsTitle();
      } catch (error) {
        console.error("カレンダーデータ読み込みエラー:", error);
        this.showMessage("カレンダーデータの読み込みに失敗しました。", "error");
      }
    }

    /**
     * カレンダーの描画
     */
    renderCalendar(summary) {
      const container = document.getElementById("calendarContainer");
      if (!container) return;

      let html = `
        <table class="attendance-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>出勤</th>
              <th>退勤</th>
              <th>中抜け(h)</th>
              <th>勤務時間(h)</th>
              <th>残業(h)</th>
              <th>半休</th>
              <th>全休</th>
              <th>休日出勤</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (summary && summary.length > 0) {
        summary.forEach((item) => {
          html += `
            <tr>
              <td class="date-cell">${item.date}</td>
              <td class="time-cell">${item.clockIn || "-"}</td>
              <td class="time-cell">${item.clockOut || "-"}</td>
              <td class="break-cell">${item.breakTime || "-"}</td>
              <td class="work-cell">${item.workTime || "-"}</td>
              <td class="overtime-cell">${item.overtime || "-"}</td>
              <td>${
                item.halfDay
                  ? '<span class="special-day-indicator">◯</span>'
                  : ""
              }</td>
              <td>${
                item.fullDay
                  ? '<span class="special-day-indicator">◯</span>'
                  : ""
              }</td>
              <td>${
                item.holidayWork
                  ? '<span class="special-day-indicator">◯</span>'
                  : ""
              }</td>
            </tr>
          `;
        });
      } else {
        html += `
          <tr>
            <td colspan="9" class="loading-text">データがありません</td>
          </tr>
        `;
      }

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    /**
     * 打刻詳細の描画
     */
    renderDetails(records) {
      const container = document.getElementById("detailsContainer");
      if (!container) return;

      let html = `
        <table class="attendance-table">
          <thead>
            <tr>
              <th>行番号</th>
              <th>日付</th>
              <th>打刻内容</th>
              <th>時刻</th>
              <th>編集</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (records && records.length > 0) {
        records.forEach((record) => {
          let editButtons = "";

          // 打刻系のアクションのみ編集可能
          if (
            ["clockIn", "clockOut", "breakStart", "breakEnd"].includes(
              record.action
            )
          ) {
            editButtons = `
              <button class="btn btn-edit" onclick="window.timesApp.editAction(${record.rowNumber})">
                タイプ編集
              </button>
              <button class="btn btn-edit" onclick="window.timesApp.editTime(${record.rowNumber})">
                時間編集
              </button>
            `;
          }

          html += `
            <tr>
              <td>${record.rowNumber}</td>
              <td class="date-cell">${record.date}</td>
              <td>${this.getActionLabel(record.action)}</td>
              <td class="time-cell">${record.timestamp}</td>
              <td class="edit-cell">${editButtons}</td>
            </tr>
          `;
        });
      } else {
        html += `
          <tr>
            <td colspan="5" class="loading-text">データがありません</td>
          </tr>
        `;
      }

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    /**
     * アクションのラベル取得
     */
    getActionLabel(action) {
      const labels = {
        clockIn: "出勤",
        clockOut: "退勤",
        breakStart: "中抜け開始",
        breakEnd: "中抜け終了",
        halfDay: "半休",
        fullDay: "全休",
        holidayWork: "休日出勤",
      };
      return labels[action] || action;
    }

    /**
     * メトリクスタイトルの更新
     */
    updateMetricsTitle() {
      const metricsTitle = document.getElementById("metricsTitle");
      if (metricsTitle) {
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear();
        const currentMonth = currentDate.getMonth() + 1;

        // 現在月かどうかで表示を変える
        if (
          this.currentCalendarYear === currentYear &&
          this.currentCalendarMonth === currentMonth
        ) {
          metricsTitle.textContent = "📊 今月の勤怠";
        } else {
          metricsTitle.textContent = `📊 ${this.currentCalendarMonth}月の勤怠`;
        }
      }
    }

    /**
     * 打刻タイプの編集
     */
    async editAction(rowNumber) {
      const validActions = [
        "clockIn",
        "clockOut",
        "breakStart",
        "breakEnd",
        "halfDay",
        "fullDay",
        "holidayWork",
      ];
      const actionLabels = {
        clockIn: "出勤",
        clockOut: "退勤",
        breakStart: "中抜け開始",
        breakEnd: "中抜け終了",
        halfDay: "半休",
        fullDay: "全休",
        holidayWork: "休日出勤",
      };

      const options = validActions
        .map((action) => `${action} (${actionLabels[action]})`)
        .join("\n");
      const newAction = prompt(
        `新しい打刻タイプを入力してください:\n\n${options}`
      );

      if (!newAction) return;

      const actionKey = newAction.trim().split(" ")[0];
      if (!validActions.includes(actionKey)) {
        alert("無効な打刻タイプです。");
        return;
      }

      this.showLoading();

      try {
        const sheetName = `${this.currentCalendarYear}${String(
          this.currentCalendarMonth
        ).padStart(2, "0")}`;
        const result = await this.callGASFunction(
          "updatePunchAction",
          sheetName,
          rowNumber,
          actionKey,
          ""
        );

        if (result.success) {
          await this.loadCalendarData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("打刻タイプ編集エラー:", error);
        this.showMessage("打刻タイプの編集に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 打刻時間の編集
     */
    async editTime(rowNumber) {
      const newTime = prompt(
        "新しい時刻を「yyyy-MM-dd HH:mm:ss」の形式で入力してください。\n例: 2024-09-27 09:00:00"
      );

      if (!newTime) return;

      // 簡単な形式チェック
      if (!/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(newTime)) {
        alert("正しい形式で入力してください。\n例: 2024-09-27 09:00:00");
        return;
      }

      this.showLoading();

      try {
        const sheetName = `${this.currentCalendarYear}${String(
          this.currentCalendarMonth
        ).padStart(2, "0")}`;
        const result = await this.callGASFunction(
          "updatePunchTime",
          sheetName,
          rowNumber,
          newTime,
          ""
        );

        if (result.success) {
          await this.loadCalendarData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("打刻時間編集エラー:", error);
        this.showMessage("打刻時間の編集に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 工数詳細テーブルの描画
     */
    renderWorkloadDetails(details, projectId, projectName) {
      if (!details || details.length === 0) {
        return '<div class="loading-text">工数記録がありません</div>';
      }

      return `
        <table class="workload-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>担当者</th>
              <th>工数</th>
              <th>メモ</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            ${details
              .map(
                (detail) => `
              <tr data-workload-id="${detail.id}" data-project-id="${detail.projectId}">
                <td class="date-cell">${detail.date}</td>
                <td>${detail.employeeName || detail.employeeNumber}</td>
                <td class="hours-cell">${detail.hours}h</td>
                <td class="memo-cell" title="${detail.memo}">${detail.memo}</td>
                <td class="action-cell">
                  <button class="btn btn-sm btn-edit" onclick="window.timesApp.editWorkload('${detail.id}', '${projectId}', '${projectName}', '${detail.date}', ${detail.hours}, '${(detail.memo || '').replace(/'/g, "\\'")}')">
                    <span class="btn-icon">✏️</span>
                    編集
                  </button>
                </td>
              </tr>
            `
              )
              .join("")}
          </tbody>
        </table>
      `;
    }

    /**
     * アコーディオンの開閉
     */
    toggleAccordion(projectId) {
      const content = document.getElementById(`accordion-${projectId}`);
      const arrow = content.parentElement.querySelector(".accordion-arrow");

      if (content.classList.contains("open")) {
        content.classList.remove("open");
        arrow.textContent = "▼";
      } else {
        content.classList.add("open");
        arrow.textContent = "▲";
      }
    }

    /**
     * 案件作成フォームの処理
     */
    async handleProjectCreation(event) {
      event.preventDefault();

      if (!this.currentUser) return;

      try {
        this.showLoading();

        const formData = new FormData(event.target);
        const name = formData.get("projectName");
        const description = formData.get("projectDescription");

        const result = await this.callGASFunction(
          "createProject",
          name,
          description,
          this.currentUser.employeeNumber
        );

        if (result.success) {
          // this.showMessage("案件を作成しました", "success");
          event.target.reset();
          this.loadWorkloadData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("案件作成エラー:", error);
        this.showMessage("案件の作成に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 工数入力モーダルを開く
     */
    openWorkloadModal(projectId, projectName) {
      this.currentProject = { id: projectId, name: projectName };

      // 日付をデフォルトで今日に設定
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("workloadDate").value = today;

      // モーダルタイトルを設定
      document.getElementById(
        "modalTitle"
      ).textContent = `⏱️ ${projectName} - 工数入力`;

      // モーダルを表示
      document.getElementById("workloadModal").style.display = "flex";

    /**
     * 工数入力モーダルを閉じる
     */
    closeWorkloadModal() {
      document.getElementById("workloadModal").style.display = "none";
      document.getElementById("workloadForm").reset();
      this.currentProject = null;
      this.editingWorkload = null;

      // ボタンのテキストを元に戻す
      const submitBtn = document.getElementById("submitWorkloadBtn");
      submitBtn.querySelector(".btn-text").textContent = "工数を記録";
      document.getElementById("modalTitle").textContent = "⏱️ 工数入力";

    /**
     * 工数編集
     */
    editWorkload(workloadId, projectId, projectName, date, hours, memo) {
      // 編集モードの設定
      this.editingWorkload = {
        id: workloadId,
        projectId: projectId,
        projectName: projectName
      };

      // フォームに既存データを入力
      document.getElementById("workloadDate").value = date;
      document.getElementById("workloadHours").value = hours;
      document.getElementById("workloadMemo").value = memo;

      // モーダルタイトルとボタンテキストを編集モード用に変更
      document.getElementById("modalTitle").textContent = "⏱️ 工数編集";
      const submitBtn = document.getElementById("submitWorkloadBtn");
      submitBtn.querySelector(".btn-text").textContent = "変更を保存";

      // モーダルを表示
      document.getElementById("workloadModal").style.display = "flex";
    }

    /**
     * JavaScript文字列として安全にエスケープ
     */
    escapeForJS(str) {
      if (!str) return '';
      return str
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '\\r')
        .replace(/\t/g, '\\t');
    }

    /**
     * 案件情報編集
     */
    editProject(projectId, projectName, projectDescription) {
      // 編集モードの設定
      this.editingProject = {
        id: projectId,
        name: projectName,
        description: projectDescription
      };

      // フォームに既存データを入力
      document.getElementById("editProjectName").value = projectName;
      document.getElementById("editProjectDescription").value = projectDescription || "";

      // モーダルを表示
      document.getElementById("projectEditModal").style.display = "flex";
    }

    /**
     * 案件情報編集モーダルを閉じる
     */
    closeProjectEditModal() {
      document.getElementById("projectEditModal").style.display = "none";
      document.getElementById("projectEditForm").reset();
      this.editingProject = null;
    }

    /**
     * 案件情報更新の処理
     */
    async handleProjectEditSubmission(event) {
      event.preventDefault();

      if (!this.editingProject) return;

      try {
        this.showLoading();

        const formData = new FormData(event.target);
        const name = formData.get("editProjectName");
        const description = formData.get("editProjectDescription") || "";

        const result = await this.callGASFunction(
          "updateProject",
          this.editingProject.id,
          name,
          description
        );

        if (result.success) {
          this.showMessage('案件情報を更新しました', 'success');
          this.closeProjectEditModal();
          // 案件一覧を再読み込み
          this.loadWorkloadData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("案件情報更新エラー:", error);
        this.showMessage("案件情報の更新に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 工数記録の処理
     */
    async handleWorkloadSubmission(event) {
      event.preventDefault();

      // 編集モードか新規作成モードかチェック
      const isEditMode = !!this.editingWorkload;

      if (!this.currentUser && !isEditMode) return;
      if (!this.currentProject && !isEditMode) return;

      try {
        this.showLoading();

        const formData = new FormData(event.target);
        const date = formData.get("workloadDate");
        const hours = parseFloat(formData.get("workloadHours"));
        const memo = formData.get("workloadMemo") || "";

        let result;

        if (isEditMode) {
          // 編集モード - recordWorkload関数を使用（同日同ユーザーの場合は上書き）
          result = await this.callGASFunction(
            "recordWorkload",
            this.editingWorkload.projectId,
            this.editingWorkload.projectName || '',
            this.currentUser.employeeNumber,
            date,
            hours,
            memo
          );
        } else {
          // 新規作成モード
          result = await this.callGASFunction(
            "recordWorkload",
            this.currentProject.id,
            this.currentProject.name,
            this.currentUser.employeeNumber,
            date,
            hours,
            memo
          );
        }

        if (result.success) {
          this.showMessage(isEditMode ? '工数を更新しました' : '工数を記録しました', 'success');
          this.closeWorkloadModal();
          this.loadWorkloadData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("工数処理エラー:", error);
        this.showMessage(isEditMode ? "工数の更新に失敗しました。" : "工数の記録に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 案件をクローズ
     */
    async closeProject(projectId) {
      if (!confirm("この案件をクローズしますか？")) return;

      try {
        this.showLoading();
        const result = await this.callGASFunction(
          "updateProjectStatus",
          projectId,
          "close"
        );

        if (result.success) {
          this.showMessage("案件をクローズしました", "success");
          this.loadWorkloadData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("案件クローズエラー:", error);
        this.showMessage("案件のクローズに失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

     * 案件を再オープン
     */
    async reopenProject(projectId) {
      try {
        this.showLoading();
        const result = await this.callGASFunction(
          "updateProjectStatus",
          projectId,
          "open"
        );

        if (result.success) {
          this.showMessage("案件を再オープンしました", "success");
          this.loadWorkloadData();
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("案件再オープンエラー:", error);
        this.showMessage("案件の再オープンに失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * クローズ案件の表示切り替え
     */
    async toggleClosedProjects() {
      if (!this.currentUser) return;

      try {
        this.showLoading();

        const showClosed =
          document.getElementById("showClosedBtn").style.display === "none";

        // 担当案件一覧を更新
        const assignedProjectsResult = await this.callGASFunction(
          "getUserProjects",
          this.currentUser.employeeNumber,
          !showClosed
        );
        this.renderAssignedProjectsList(assignedProjectsResult.data || []);

        // 全案件一覧を更新（既に読み込み済みの場合のみ）
        const projectsContainer = document.getElementById("projectsList");
        if (
          projectsContainer &&
          !projectsContainer.querySelector(".initial-message")
        ) {
          const projectsResult = await this.callGASFunction(
            "getAllProjects",
            this.currentUser.employeeNumber,
            !showClosed
          );
          this.renderProjectsList(projectsResult.data || []);
        }

        this.updateClosedProjectsButton(!showClosed);
      } catch (error) {
        console.error("クローズ案件表示切り替えエラー:", error);
        this.showMessage("案件一覧の更新に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 担当案件のクローズ案件表示切り替え
     */
    async toggleAssignedClosedProjects() {
      if (!this.currentUser) return;

      try {
        this.showLoading();

        const showAssignedClosed =
          document.getElementById("showAssignedClosedBtn").style.display ===
          "none";

        // 担当案件一覧のみを更新
        const assignedProjectsResult = await this.callGASFunction(
          "getUserProjects",
          this.currentUser.employeeNumber,
          !showAssignedClosed
        );
        this.renderAssignedProjectsList(assignedProjectsResult.data || []);

        this.updateAssignedClosedProjectsButton(!showAssignedClosed);
      } catch (error) {
        console.error("担当案件クローズ表示切り替えエラー:", error);
        this.showMessage("担当案件一覧の更新に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 案件を自分に割り当て
     */
    async assignProject(projectId) {
      if (!this.currentUser) return;

      try {
        this.showLoading();
        const result = await this.callGASFunction(
          "assignProjectToUser",
          projectId,
          this.currentUser.employeeNumber
        );

        if (result.success) {
          this.showMessage("案件を自分に割り当てました", "success");

          // 担当案件一覧を更新
          const assignedResult = await this.callGASFunction(
            "getUserProjects",
            this.currentUser.employeeNumber,
            false
          );
          this.renderAssignedProjectsList(assignedResult.data || []);

          // 全案件一覧が既に読み込まれている場合は更新
          const projectsContainer = document.getElementById("projectsList");
          if (
            projectsContainer &&
            !projectsContainer.querySelector(".initial-message")
          ) {
            const showClosed =
              document.getElementById("showClosedBtn").style.display === "none";
            const projectsResult = await this.callGASFunction(
              "getAllProjects",
              this.currentUser.employeeNumber,
              showClosed
            );
            this.renderProjectsList(projectsResult.data || []);
          }
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("案件割り当てエラー:", error);
        this.showMessage("案件の割り当てに失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * 案件の割り当てを解除
     */
    async unassignProject(projectId) {
      if (!this.currentUser) return;

      if (!confirm("この案件の割り当てを解除しますか？")) return;

      try {
        this.showLoading();
        const result = await this.callGASFunction(
          "unassignProjectFromUser",
          projectId,
          this.currentUser.employeeNumber
        );

        if (result.success) {
          this.showMessage("案件の割り当てを解除しました", "success");

          // 担当案件一覧を更新
          const assignedResult = await this.callGASFunction(
            "getUserProjects",
            this.currentUser.employeeNumber,
            false
          );
          this.renderAssignedProjectsList(assignedResult.data || []);

          // 全案件一覧が既に読み込まれている場合は更新
          const projectsContainer = document.getElementById("projectsList");
          if (
            projectsContainer &&
            !projectsContainer.querySelector(".initial-message")
          ) {
            const showClosed =
              document.getElementById("showClosedBtn").style.display === "none";
            const projectsResult = await this.callGASFunction(
              "getAllProjects",
              this.currentUser.employeeNumber,
              showClosed
            );
            this.renderProjectsList(projectsResult.data || []);
          }
        } else {
          this.showMessage(result.message, "error");
        }
      } catch (error) {
        console.error("案件割り当て解除エラー:", error);
        this.showMessage("案件の割り当て解除に失敗しました。", "error");
      } finally {
        this.hideLoading();
      }
    }

    /**
     * クローズ案件表示ボタンの状態更新
     */
    updateClosedProjectsButton(showingClosed) {
      const showBtn = document.getElementById("showClosedBtn");
      const hideBtn = document.getElementById("hideClosedBtn");

      if (showingClosed) {
        showBtn.style.display = "none";
        hideBtn.style.display = "inline-flex";
      } else {
        showBtn.style.display = "inline-flex";
        hideBtn.style.display = "none";
      }
    }

    /**
     * 担当案件のクローズ案件表示ボタンの状態更新
     */
    updateAssignedClosedProjectsButton(showingClosed) {
      const showBtn = document.getElementById("showAssignedClosedBtn");
      const hideBtn = document.getElementById("hideAssignedClosedBtn");

      if (showingClosed) {
        showBtn.style.display = "none";
        hideBtn.style.display = "inline-flex";
      } else {
        showBtn.style.display = "inline-flex";
        hideBtn.style.display = "none";
      }
    }

    /**
     * 工数管理セクションのセットアップ
     */
    setupWorkloadManagement() {
      // 案件作成フォーム
      const projectForm = document.getElementById("projectForm");
      if (projectForm) {
        projectForm.addEventListener("submit", (e) =>
          this.handleProjectCreation(e)
        );
      }

      // 工数入力フォーム
      const workloadForm = document.getElementById("workloadForm");
      if (workloadForm) {
        workloadForm.addEventListener("submit", (e) =>
          this.handleWorkloadSubmission(e)
        );
      }

      // 案件編集フォーム
      const projectEditForm = document.getElementById("projectEditForm");
      if (projectEditForm) {
        projectEditForm.addEventListener("submit", (e) =>
          this.handleProjectEditSubmission(e)
        );
      }

      // モーダル制御
      const closeModalBtn = document.getElementById("closeWorkloadModal");
      if (closeModalBtn) {
        closeModalBtn.addEventListener("click", () =>
          this.closeWorkloadModal()
        );
      }

      const cancelBtn = document.getElementById("cancelWorkloadBtn");
      if (cancelBtn) {
        cancelBtn.addEventListener("click", () => this.closeWorkloadModal());
      }

      // 案件編集モーダル制御
      const closeProjectEditModalBtn = document.getElementById("closeProjectEditModal");
      if (closeProjectEditModalBtn) {
        closeProjectEditModalBtn.addEventListener("click", () => this.closeProjectEditModal());
      }

      const cancelProjectEditBtn = document.getElementById("cancelProjectEditBtn");
      if (cancelProjectEditBtn) {
        cancelProjectEditBtn.addEventListener("click", () => this.closeProjectEditModal());
      }

      // 全案件読み込みボタン
      const loadAllProjectsBtn = document.getElementById("loadAllProjectsBtn");
      if (loadAllProjectsBtn) {
        loadAllProjectsBtn.addEventListener("click", () =>
          this.loadAllProjects(false)
        );
      }

      // クローズ案件表示ボタン
      const showClosedBtn = document.getElementById("showClosedBtn");
      if (showClosedBtn) {
        showClosedBtn.addEventListener("click", () =>
          this.toggleClosedProjects()
        );
      }

      const hideClosedBtn = document.getElementById("hideClosedBtn");
      if (hideClosedBtn) {
        hideClosedBtn.addEventListener("click", () =>
          this.toggleClosedProjects()
        );
      }

      // クローズ案件表示ボタン（担当案件一覧用）
      const showAssignedClosedBtn = document.getElementById(
        "showAssignedClosedBtn"
      );
      if (showAssignedClosedBtn) {
        showAssignedClosedBtn.addEventListener("click", () =>
          this.toggleAssignedClosedProjects()
        );
      }
      const hideAssignedClosedBtn = document.getElementById(
        "hideAssignedClosedBtn"
      );
      if (hideAssignedClosedBtn) {
        hideAssignedClosedBtn.addEventListener("click", () =>
          this.toggleAssignedClosedProjects()
        );
      }

      // モーダル外クリックで閉じる
      const modal = document.getElementById("workloadModal");
      if (modal) {
        modal.addEventListener("click", (e) => {
          if (e.target === modal) {
            this.closeWorkloadModal();
          }
        });
      }

      const projectEditModal = document.getElementById("projectEditModal");
      if (projectEditModal) {
        projectEditModal.addEventListener("click", (e) => {
          if (e.target === projectEditModal) {
            this.closeProjectEditModal();
          }
        });
      }
    }

    /**
     * メトリクス表示の更新
     */
    updateMetricsDisplay(metrics) {
      const workingDaysElement = document.getElementById("workingDaysValue");
      const surplusDeficitElement = document.getElementById(
        "surplusDeficitValue"
      );
      const averageOvertimeElement = document.getElementById(
        "averageOvertimeValue"
      );

      if (workingDaysElement) {
        workingDaysElement.textContent = `${metrics.workingDays}日`;
      }

      if (surplusDeficitElement) {
        surplusDeficitElement.textContent = `${
          metrics.surplusDeficit >= 0 ? "+" : ""
        }${metrics.surplusDeficit}時間`;
        surplusDeficitElement.className = "metric-value";
        if (metrics.surplusDeficit < -20 || metrics.surplusDeficit >= 20) {
          surplusDeficitElement.classList.add("danger");
        } else if (metrics.surplusDeficit < 0 || metrics.surplusDeficit >= 10) {
          surplusDeficitElement.classList.add("warning");
        }
      }

      if (averageOvertimeElement) {
        averageOvertimeElement.textContent = `${metrics.averageOvertime}時間`;
        averageOvertimeElement.className = "metric-value";
        if (metrics.averageOvertime >= 2.0) {
          averageOvertimeElement.classList.add("danger");
        } else if (metrics.averageOvertime >= 1.5) {
          averageOvertimeElement.classList.add("warning");
        }
      }
    }

    /**
     * ナビゲーションのアクティブ状態更新
     */
    updateNavActive(activeBtn) {
      const navBtns = document.querySelectorAll(".nav-btn");
      navBtns.forEach((btn) => btn.classList.remove("active"));
      activeBtn.classList.add("active");
    }

    /**
     * ユーザー表示の更新
     */
    updateUserDisplay() {
      if (!this.currentUser) return;

      const userName = document.getElementById("userName");
      const userEmployeeNumber = document.getElementById("userEmployeeNumber");
      const userRegisteredAt = document.getElementById("userRegisteredAt");

      if (userName) {
        userName.textContent = this.currentUser.name;
      }

      if (userEmployeeNumber) {
        userEmployeeNumber.textContent = this.currentUser.employeeNumber;
      }

      if (userRegisteredAt && this.currentUser.registeredAt) {
        const date = new Date(this.currentUser.registeredAt);
        userRegisteredAt.textContent = date.toLocaleDateString("ja-JP");
      }
    }

    /**
     * メッセージ表示
     */
    showMessage(message, type = "info") {
      if (this.currentView === "home") {
        // ホームビュー用のメッセージ表示
        const messageArea = document.getElementById("messageArea");
        const messageText = document.getElementById("messageText");

        if (messageArea && messageText) {
          messageText.textContent = message;
          messageText.className = `message ${type}`;
          messageArea.style.display = "flex";

          // 3秒後に自動非表示
          setTimeout(() => {
            this.hideMessage();
          }, 3000);
        }
      } else {
        // ログインビュー用のメッセージ表示
        const messageArea = document.getElementById("messageAreaLogin");
        const messageContent = document.getElementById("messageContentLogin");

        if (messageArea && messageContent) {
          messageContent.textContent = message;
          messageContent.className = `message ${type}`;
          messageArea.style.display = "block";

          // 3秒後に自動非表示
          setTimeout(() => {
            this.hideMessage();
          }, 3000);
        }
      }
    }

    /**
     * メッセージ非表示
     */
    hideMessage() {
      const messageArea = document.getElementById("messageArea");
      const messageAreaLogin = document.getElementById("messageAreaLogin");

      if (messageArea) {
        messageArea.style.display = "none";
      }
      if (messageAreaLogin) {
        messageAreaLogin.style.display = "none";
      }
    }

    /**
     * ローディング表示
     */
    showLoading() {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.style.display = "flex";
      }
    }

    /**
     * ローディング非表示
     */
    hideLoading() {
      const loading = document.getElementById("loading");
      if (loading) {
        loading.style.display = "none";
      }
    }

    /**
     * ボタン無効化
     */
    disableButton(buttonId) {
      const button = document.getElementById(buttonId);
      if (button) {
        button.disabled = true;
        button.style.opacity = "0.6";
      }
    }

    /**
     * ボタン有効化
     */
    enableButton(buttonId) {
      const button = document.getElementById(buttonId);
      if (button) {
        button.disabled = false;
        button.style.opacity = "1";
      }
    }

    /**
     * GAS関数呼び出し
     */
    async callGASFunction(functionName, ...args) {
      console.log(`GAS関数呼び出し: ${functionName}`, args);

      return new Promise((resolve, reject) => {
        if (
          !window.google ||
          !window.google.script ||
          !window.google.script.run
        ) {
          const error = "Google Apps Script が利用できません";
          console.error(error);
          reject(new Error(error));
          return;
        }

        const timeout = setTimeout(() => {
          console.error(
            `タイムアウト: ${functionName} の実行に30秒以上かかりました`
          );
          reject(
            new Error(`関数 ${functionName} の実行がタイムアウトしました`)
          );
        }, 30000);

        try {
          google.script.run
            .withSuccessHandler((result) => {
              clearTimeout(timeout);
              console.log(`GAS関数成功: ${functionName}`, result);
              resolve(result);
            })
            .withFailureHandler((error) => {
              clearTimeout(timeout);
              console.error(`GAS関数エラー: ${functionName}`, error);
              reject(error);
            })
            [functionName](...args);

          console.log(`google.script.run.${functionName} を実行しました`);
        } catch (e) {
          clearTimeout(timeout);
          console.error("google.script.run の実行中にエラー:", e);
          reject(e);
        }
      });
    }
  }

  // DOM読み込み完了後にアプリケーションを初期化
  document.addEventListener("DOMContentLoaded", () => {
    window.timesApp = new TimesApp();
  });

  // ページ読み込み時にローディングを非表示
  window.addEventListener("load", () => {
    const loading = document.getElementById("loading");
    if (loading) {
      loading.style.display = "none";
    }
  });

  // エラーハンドリング
  window.addEventListener("error", (event) => {
    console.error("JavaScript エラー:", event.error);

    // ユーザーにエラーメッセージを表示
    if (window.timesApp) {
      window.timesApp.showMessage(
        "アプリケーションでエラーが発生しました。ページを再読み込みしてください。",
        "error"
      );
    }
  });

  // オフライン検知
  window.addEventListener("offline", () => {
    if (window.timesApp) {
      window.timesApp.showMessage(
        "インターネット接続が切断されました。機能が制限される可能性があります。",
        "warning"
      );
    }
  });

  window.addEventListener("online", () => {
    if (window.timesApp) {
      window.timesApp.showMessage(
        "インターネット接続が復旧しました。",
        "success"
      );
    }
  });
</script>
