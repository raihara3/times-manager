<!-- 出退勤管理セクションのメインコンテンツ -->
<div class="section-header">
  <h2>⏱️ 出退勤管理</h2>

</div>

  <span class="status-icon">🔄</span>

</div>

    <h3>⏱️ 打刻操作</h3>
  </div>

        <span class="punch-icon">🟢</span>

      </button>
      <button class="punch-btn clock-out" id="btnClockOut">

      </button>

      </button>

        <span class="punch-icon">▶️</span>
        <span class="punch-label">中抜け終了</span>
      </button>
    </div>
  </div>
</div>

<!-- 特別打刻 -->
<div class="card">
  <div class="card-header">
    <h3>📋 特別打刻</h3>
    <p>全休・半休・休日出勤の日付指定打刻</p>
  </div>
  <div class="card-content">

            <option value="">-- 選択してください --</option>
            <option value="fullDay">全休 (8時間加算)</option>
            <option value="halfDay">半休 (4時間加算)</option>
            <option value="holidayWork">休日出勤 (勤務時間全て残業)</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btnSpecialPunch" disabled>
          <span class="btn-icon">📝</span>
          特別打刻を記録
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 月次指標 -->

  <div class="card-header">

  </div>

      <div class="metric-item">

      </div>
      <div class="metric-item">
        <div class="metric-value" id="averageOvertimeValue">-</div>
        <div class="metric-label">平均残業時間</div>
      </div>
    </div>
  </div>
</div>

<!-- 勤怠カレンダー -->

      <button class="btn btn-outline" id="nextMonthBtn">

  </div>
</div>
