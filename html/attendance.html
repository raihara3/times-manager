<!-- 出退勤管理セクションのメインコンテンツ -->
<div class="section-header">
  <h2>⏱️ 出退勤管理</h2>
  <p>勤怠の打刻と管理を行います</p>
</div>

<!-- 現在の状態表示 -->
<div class="status-display" id="statusDisplay">
  <span class="status-icon">🔄</span>
  <span id="statusText">状態を確認中...</span>
</div>

<!-- 打刻ボタン -->
<div class="card">
  <div class="card-header">
    <h3>⏱️ 打刻操作</h3>
  </div>
  <div class="card-content">
    <div class="punch-buttons">
      <button class="punch-btn clock-in" id="btnClockIn">
        <span class="punch-icon">🟢</span>
        <span class="punch-label">出勤打刻</span>
      </button>
      <button class="punch-btn clock-out" id="btnClockOut">
        <span class="punch-icon">🔴</span>
        <span class="punch-label">退勤打刻</span>
      </button>
      <button class="punch-btn break" id="btnBreakStart">
        <span class="punch-icon">⏸️</span>
        <span class="punch-label">中抜け開始</span>
      </button>
      <button class="punch-btn break" id="btnBreakEnd">
        <span class="punch-icon">▶️</span>
        <span class="punch-label">中抜け終了</span>
      </button>
    </div>
  </div>
</div>

<!-- 月次指標 -->
<div class="card">
  <div class="card-header">
    <h3>📊 今月の実績</h3>
  </div>
  <div class="card-content">
    <div class="metrics-grid" id="metricsGrid">
      <div class="metric-item">
        <div class="metric-value" id="workingDaysValue">-</div>
        <div class="metric-label">出勤日数</div>
      </div>
      <div class="metric-item">
        <div class="metric-value" id="surplusDeficitValue">-</div>
        <div class="metric-label">過不足時間</div>
      </div>
      <div class="metric-item">
        <div class="metric-value" id="averageOvertimeValue">-</div>
        <div class="metric-label">平均残業時間</div>
      </div>
    </div>
  </div>
</div>
