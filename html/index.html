<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Times. - ログイン</title>
    <?!= include('styles'); ?>
  </head>
  <body>
    <div class="container">
      <!-- ヘッダー -->
      <header class="header">
        <div class="header-content">
          <h1 class="logo">⏰ Times.</h1>
          <p class="tagline">シンプルで可愛い工数管理</p>
        </div>
      </header>

      <!-- メインコンテンツ -->
      <main class="main">
        <div class="card login-card">
          <!-- ログインフォーム -->
          <div id="loginSection" class="form-section">
            <div class="form-header">
              <h2>🔐 ログイン</h2>
              <p>社員番号を入力してログインしてください</p>
            </div>

            <form id="loginForm" class="form">
              <div class="input-group">
                <label for="employeeNumber"> 👤 社員番号 </label>
                <input
                  type="text"
                  id="employeeNumber"
                  name="employeeNumber"
                  placeholder="例: EMP001"
                  autocomplete="username"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary" id="loginBtn">
                <span class="btn-icon">🚀</span>
                ログイン
              </button>
            </form>

            <div class="divider">
              <span>または</span>
            </div>

            <button type="button" class="btn btn-outline" id="showRegisterBtn">
              <span class="btn-icon">✨</span>
              新規登録
            </button>
          </div>

          <!-- 登録フォーム -->
          <div id="registerSection" class="form-section" style="display: none">
            <div class="form-header">
              <h2>✨ 新規登録</h2>
              <p>社員番号と名前を入力して登録してください</p>
            </div>

            <form id="registerForm" class="form">
              <div class="input-group">
                <label for="regEmployeeNumber"> 👤 社員番号 </label>
                <input
                  type="text"
                  id="regEmployeeNumber"
                  name="regEmployeeNumber"
                  placeholder="例: EMP001"
                  required
                />
              </div>

              <div class="input-group">
                <label for="regName"> 🏷️ 名前 </label>
                <input
                  type="text"
                  id="regName"
                  name="regName"
                  placeholder="例: 田中太郎"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary" id="registerBtn">
                <span class="btn-icon">🎉</span>
                登録する
              </button>
            </form>

            <div class="divider">
              <span>または</span>
            </div>

            <button type="button" class="btn btn-outline" id="showLoginBtn">
              <span class="btn-icon">🔙</span>
              ログインに戻る
            </button>
          </div>

          <!-- メッセージ表示エリア -->
          <div id="messageArea" class="message-area" style="display: none">
            <div id="messageContent" class="message"></div>
          </div>
        </div>
      </main>

      <!-- フッター -->
      <footer class="footer">
        <p>© 2024 Times. - Made with ❤️</p>
      </footer>
    </div>

    <!-- ローディング -->
    <div id="loading" class="loading-overlay" style="display: none">
      <div class="loading-content">
        <div class="spinner">⏰</div>
        <p>処理中...</p>
      </div>
    </div>

    <?!= include('scripts'); ?>
  </body>
</html>
