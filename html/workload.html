<!-- 工数管理セクションのメインコンテンツ -->
<div class="section-header">
  <h2>📊 工数管理</h2>
  <p>案件の工数管理と記録を行います</p>
</div>

<!-- 担当案件一覧 -->
<div class="card">
  <div class="card-header">
    <h3>👤 担当案件一覧</h3>
    <p>自分に割り当てられている案件のみ表示されます。</p>
    <div class="list-controls">
      <button
        class="btn btn-outline"
        id="showAssignedClosedBtn"
        style="display: none"
      >
        <span class="btn-icon">👁️</span>
        クローズ案件を表示
      </button>
      <button
        class="btn btn-outline"
        id="hideAssignedClosedBtn"
        style="display: none"
      >
        <span class="btn-icon">🙈</span>
        クローズ案件を非表示
      </button>
    </div>
  </div>
  <div class="card-content">
    <div id="assignedProjectsList" class="projects-container">
      <div class="loading-text">読み込み中...</div>
    </div>
  </div>
</div>

<!-- 新規案件作成 -->
<div class="card">
  <div class="card-header">
    <h3>✨ 新規案件作成</h3>
  </div>
  <div class="card-content">
    <form id="projectForm" class="project-form">
      <div class="form-row">
        <div class="input-group">
          <label for="projectName">📝 案件名</label>
          <input
            type="text"
            id="projectName"
            name="projectName"
            placeholder="例: Webサイトリニューアル"
            required
          />
        </div>
        <div class="input-group">
          <label for="projectDescription">📋 案件概要</label>
          <textarea
            id="projectDescription"
            name="projectDescription"
            placeholder="例: 企業サイトのデザインとシステム刷新"
            rows="3"
          ></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="createProjectBtn">
          <span class="btn-icon">🚀</span>
          案件を作成
        </button>
      </div>
    </form>
  </div>
</div>

<!-- 全案件一覧 -->
<div class="card">
  <div class="card-header">
    <h3>📋 全案件一覧</h3>
    <p>
      全ての案件が表示されます。未割り当ての案件は自分に割り当てることができます。
    </p>
    <div class="list-controls">
      <button class="btn btn-primary" id="loadAllProjectsBtn">
        <span class="btn-icon">📂</span>
        全案件を読み込み
      </button>
      <button class="btn btn-outline" id="showClosedBtn" style="display: none">
        <span class="btn-icon">👁️</span>
        クローズ案件を表示
      </button>
      <button class="btn btn-outline" id="hideClosedBtn" style="display: none">
        <span class="btn-icon">🙈</span>
        クローズ案件を非表示
      </button>
    </div>
  </div>
  <div class="card-content">
    <div id="projectsList" class="projects-container">
      <div class="initial-message">
        <div class="message-icon">📂</div>
        <h4>全案件一覧</h4>
        <p>
          上の「全案件を読み込み」ボタンをクリックして案件一覧を表示してください。
        </p>
      </div>
    </div>
  </div>
</div>

<!-- 工数入力モーダル -->
<div id="workloadModal" class="modal-overlay" style="display: none">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">⏱️ 工数入力</h3>
      <button class="modal-close" id="closeWorkloadModal">✕</button>
    </div>
    <div class="modal-body">
      <form id="workloadForm">
        <div class="input-group">
          <label for="workloadDate">📅 日付</label>
          <input type="date" id="workloadDate" name="workloadDate" required />
        </div>
        <div class="input-group">
          <label for="workloadHours">⏱️ 工数（時間）</label>
          <input
            type="number"
            id="workloadHours"
            name="workloadHours"
            min="0.5"
            max="24"
            step="0.5"
            placeholder="例: 3.5"
            required
          />
        </div>
        <div class="input-group">
          <label for="workloadMemo">📝 メモ</label>
          <textarea
            id="workloadMemo"
            name="workloadMemo"
            placeholder="作業内容などのメモ（任意）"
            rows="3"
          ></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <span class="btn-icon">💾</span>
            工数を記録
          </button>
          <button type="button" class="btn btn-outline" id="cancelWorkloadBtn">
            <span class="btn-icon">🚫</span>
            キャンセル
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
